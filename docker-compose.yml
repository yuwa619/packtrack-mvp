services:
  postgres:
    image: postgres:15
    container_name: packtrack-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: packtrack-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: packtrack-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  api:
    build:
      context: ./api
    container_name: packtrack-api
    environment:
      PROJECT_NAME: ${PROJECT_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW}
      MINIO_BUCKET_PREPROCESSED: ${MINIO_BUCKET_PREPROCESSED:-preprocessed}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS}
      MINIO_FORCE_LOCAL: ${MINIO_FORCE_LOCAL:-false}
      MINIO_ALLOW_LOCAL_FALLBACK: ${MINIO_ALLOW_LOCAL_FALLBACK:-true}
      MINIO_FALLBACK_DIR: ${MINIO_FALLBACK_DIR:-data/minio_stub}
      OCR_CONFIDENCE_THRESHOLD: ${OCR_CONFIDENCE_THRESHOLD:-0.70}
      CLASSIFICATION_CONFIDENCE_THRESHOLD: ${CLASSIFICATION_CONFIDENCE_THRESHOLD:-0.85}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-52428800}
      UPLOAD_URL_EXPIRY_SECONDS: ${UPLOAD_URL_EXPIRY_SECONDS:-900}
      PROCESSING_QUEUE_NAME: ${PROCESSING_QUEUE_NAME:-packtrack:queue:preprocess}
      PIPELINE_STAGE_MAX_ATTEMPTS: ${PIPELINE_STAGE_MAX_ATTEMPTS:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
    container_name: packtrack-worker
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${WORKER_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/v1/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: packtrack-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      FRONTEND_PORT: ${FRONTEND_PORT}
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  miniodata:
