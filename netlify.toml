[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all unmatched routes serve index.html so client-side
# routing works (React Router, hash routing, deep-link bookmarks).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# VITE_API_BASE_URL is set in the Netlify dashboard → Site settings →
# Environment variables. Do NOT set it here — netlify.toml values
# override dashboard values for context-specific environment blocks.
